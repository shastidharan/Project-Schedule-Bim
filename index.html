const fmtDate  = d => !d ? '—' : new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});

function computeProgress(p,refDate){
  const start=p.startDate?new Date(p.startDate):null, end=p.endDate?new Date(p.endDate):null, ref=new Date(refDate);
  if(p.status==='Done') return {pct:100,state:'done'};
  if(!start||!end) return {pct:0,state:'unknown'};
  if(ref<=start) return {pct:0,state:'upcoming'};
  if(ref>=end) return {pct:100,state:'overdue'};
  return {pct:Math.max(0,Math.min(100,Math.round(((ref-start)/(end-start))*100))),state:'ontrack'};
}
function isActiveInRange(p,rs,re){
  if(p.status==='Done'){ if(!p.endDate)return false; const e=new Date(p.endDate); return e>=rs&&e<=re; }
  const s=p.startDate?new Date(p.startDate):null, e=p.endDate?new Date(p.endDate):null;
  if(!s)return false; return (!e||e>=rs)&&s<=re;
}
function parsePeople(s){ if(!s)return []; return [...new Set(s.split(/[,\/]/).map(x=>x.trim()).filter(Boolean))]; }
function normalizeProject(p){ const people=parsePeople(p.team||''); return {...p,people:people.map(x=>x.toLowerCase()),peopleCount:people.length}; }
function rangeForPeriod(date,mode){
  const d=new Date(date);
  if(mode==='week'){
    const dow=d.getUTCDay()||7, start=new Date(d); start.setUTCDate(d.getUTCDate()-(dow-1));
    const end=new Date(start); end.setUTCDate(start.getUTCDate()+6);
    start.setUTCHours(0,0,0,0); end.setUTCHours(23,59,59,0);
    return {start,end,label:`Week of ${fmtShort(start)}`};
  }
  const start=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),1));
  const end=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth()+1,0,23,59,59));
  return {start,end,label:d.toLocaleString('en',{month:'long',year:'numeric'})};

  const [tip,setTip]=useState(false);
  if(!name)return null;
  const sz={sm:'w-6 h-6 text-xs',md:'w-8 h-8 text-xs',lg:'w-10 h-10 text-sm',xl:'w-14 h-14 text-base'}[size]||'w-8 h-8 text-xs';
  return(
    <div className="relative inline-block" onMouseEnter={()=>showTooltip&&setTip(true)} onMouseLeave={()=>setTip(false)}>
      <div className={`${sz} rounded-full flex items-center justify-center font-semibold text-white flex-shrink-0 select-none`}
           style={{background:avatarColor(name.toLowerCase())}}>
        {initials(name)}
      </div>
      {tip&&showTooltip&&(
        <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2.5 py-1.5 bg-gray-900 text-white text-xs rounded-lg whitespace-nowrap z-50 pointer-events-none shadow-lg">
          {name}{role&&` · ${role}`}
          <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-gray-900"/>
        </div>
      )}
    </div>
  );
}

const STAGE_CLR = {
  'IFC':'bg-indigo-50 text-indigo-700 border-indigo-100',
  'SD':'bg-slate-50 text-slate-600 border-slate-200',
  'DD':'bg-blue-50 text-blue-600 border-blue-100',
  'REVISED DD':'bg-cyan-50 text-cyan-700 border-cyan-100',
  'TENDER':'bg-amber-50 text-amber-700 border-amber-100',
  'TENDER ADDENDUM':'bg-orange-50 text-orange-700 border-orange-100',
};
function StageBadge({stage}){
  if(!stage)return <span className="text-gray-300 text-xs">—</span>;
  const cls=STAGE_CLR[stage]||'bg-gray-50 text-gray-500 border-gray-200';
  return <span className={`inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium border ${cls} whitespace-nowrap`}>{stage}</span>;
}

const STATUS_CLR = {
  'In-progress':'bg-indigo-50 text-indigo-700 border-indigo-100',
  'Done':'bg-emerald-50 text-emerald-700 border-emerald-100',
  'To do':'bg-gray-50 text-gray-500 border-gray-200',
  'TBC':'bg-yellow-50 text-yellow-700 border-yellow-100',
};
function StatusBadge({status}){
  if(!status)return null;
  const cls=STATUS_CLR[status]||'bg-gray-50 text-gray-500 border-gray-200';
  return <span className={`inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium border ${cls}`}>{status}</span>;
}

function MiniProgress({pct,state}){
  const bg=state==='done'?'#10b981':state==='overdue'?'#ef4444':'#6366f1';
  return(
    <div className="flex items-center gap-2 min-w-0">
      <div className="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden">
        <div className="h-full rounded-full transition-all duration-700" style={{width:`${pct}%`,background:bg}}/>
      </div>
      <span className="text-xs text-gray-400 font-mono w-8 text-right flex-shrink-0">{pct}%</span>
    </div>
  );
}

function RemainingChip({days,state}){
  if(days===null||days===undefined)return <span className="text-gray-300 text-xs">—</span>;
  if(state==='done')return <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700">Done</span>;
  if(days<0) return <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold bg-red-50 text-red-600">{Math.abs(days)}d overdue</span>;
  if(days===0)return <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold bg-amber-50 text-amber-700">Due today</span>;
  if(days<=7) return <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-50 text-amber-600">{days}d left</span>;
  return <span className="text-xs text-gray-400">{days}d left</span>;
}

// ─── KPI Summary Cards ────────────────────────────────────────────────────────
function SummaryCards({kpis,period,onActiveClick,onOverdueClick}){
  const cards = [
    { id:'total',   label:'Total Projects',     value:kpis.total,           sub:`${kpis.doneCount} completed`,          icon:'📁', accent:false },
    { id:'active',  label:'Active This Period',  value:kpis.activeToday,     sub:period.label,                           icon:'⚡', accent:true,  onClick:onActiveClick },
    { id:'progress',label:'Overall Progress',    value:`${kpis.overallPct}%`,sub:'avg completion on ref date',           icon:'📈', bar:kpis.overallPct, accent:false },
    { id:'people',  label:'People Working',      value:kpis.peopleActive,    sub:'unique this period',                   icon:'👥', accent:false },
    { id:'overdue', label:'Overdue',             value:kpis.overdueCount,    sub:'past end date',                        icon:'⏰', danger:kpis.overdueCount>0, onClick:onOverdueClick },
    { id:'ref',     label:'Reference Date',      value:fmtShort(kpis.refDate),sub:new Date(kpis.refDate).toLocaleDateString('en-GB',{weekday:'long'}), icon:'📅', accent:false },
  ];
  return(
    <div className="grid grid-cols-6 gap-4 px-6 pb-4">
      {cards.map(c=><SummaryCard key={c.id} {...c}/>)}

}

function SummaryCard({label,value,sub,icon,accent,danger,bar,onClick}){
  const base = "bg-white rounded-2xl border border-gray-100 shadow-sm p-5 flex flex-col gap-2 transition-all duration-200 select-none";
  const hover = onClick ? "cursor-pointer hover:-translate-y-0.5 hover:shadow-md hover:border-indigo-100 active:scale-[0.99]" : "";
  const accentBg = accent ? "bg-indigo-50 border-indigo-100" : danger && value > 0 ? "bg-red-50 border-red-100" : "";
  return(
    <div className={`${base} ${hover} ${accentBg}`} onClick={onClick}>
      <div className="flex items-center justify-between">
        <span className="text-xs font-medium text-gray-400 uppercase tracking-wider font-mono">{label}</span>
        <span className="text-base">{icon}</span>
      </div>
      <div className={`text-3xl font-bold tracking-tight ${accent?'text-indigo-600':danger&&value>0?'text-red-600':'text-gray-900'}`}>
        {value}
      </div>
      {bar!==undefined&&(
        <div className="h-1 bg-gray-100 rounded-full overflow-hidden">
          <div className="h-full bg-indigo-500 rounded-full transition-all duration-700" style={{width:`${bar}%`}}/>
        </div>
      )}
      {sub&&<div className="text-xs text-gray-400">{sub}</div>}
      {onClick&&<div className={`text-xs font-medium mt-auto pt-1 ${accent?'text-indigo-500':danger?'text-red-500':'text-gray-400'}`}>Click to view →</div>}
    </div>

}

// ─── Active Period Modal ──────────────────────────────────────────────────────
function ActivePeriodModal({projects,period,refDate,onClose,editMode,onEditProject,title,filterFn}){
  const [search,setSearch]=useState('');
  const [teamF,setTeamF]=useState('all');
  const [stageF,setStageF]=useState('all');
  const [statusF,setStatusF]=useState('all');

  const baseProjects = useMemo(()=> filterFn ? projects.filter(filterFn) : projects.filter(p=>isActiveInRange(p,period.start,period.end)), [projects,period,filterFn]);

  const filtered = useMemo(()=>baseProjects.filter(p=>{
    if(teamF!=='all'&&p.group!==teamF)return false;
    if(stageF!=='all'&&p.stage!==stageF)return false;
    if(statusF!=='all'&&p.status!==statusF)return false;
    if(search){const q=search.toLowerCase();if(!(p.title||'').toLowerCase().includes(q)&&!(p.assignee||'').toLowerCase().includes(q))return false;}
    return true;
  }),[baseProjects,search,teamF,stageF,statusF]);

  const grouped = useMemo(()=>{
    const m=new Map();
    filtered.forEach(p=>{ const k=p.group||'OTHER'; if(!m.has(k))m.set(k,[]); m.get(k).push(p); });
    return [...m.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
  },[filtered]);

  const teams  = useMemo(()=>[...new Set(baseProjects.map(p=>p.group).filter(Boolean))].sort(),[baseProjects]);
  const stages = useMemo(()=>[...new Set(baseProjects.map(p=>p.stage).filter(Boolean))].sort(),[baseProjects]);

  useEffect(()=>{
    const h=(e)=>{if(e.key==='Escape')onClose();};
    window.addEventListener('keydown',h); return()=>window.removeEventListener('keydown',h);
  },[onClose]);

  return(
    <div className="fixed inset-0 z-50 flex items-start justify-center pt-6 px-4" style={{animation:'fadeIn 180ms ease'}}>
      <div className="absolute inset-0 bg-black/30 backdrop-blur-sm" onClick={onClose}/>
      <div className="relative bg-white rounded-2xl shadow-2xl w-full max-w-6xl max-h-[92vh] flex flex-col overflow-hidden" style={{animation:'slideUp 220ms ease'}}>

        {/* Modal Header */}
        <div className="flex items-center justify-between px-6 py-5 border-b border-gray-100 flex-shrink-0">
          <div>
            <h2 className="text-lg font-semibold text-gray-900">{title||'Active This Period'}</h2>
            <p className="text-sm text-gray-400 mt-0.5">{period.label} · {filtered.length} of {baseProjects.length} projects</p>
          </div>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition-all text-lg">✕</button>
        </div>

        {/* Filter Bar */}
        <div className="flex items-center gap-3 px-6 py-3 border-b border-gray-50 bg-gray-50/60 flex-shrink-0 flex-wrap">
          <div className="relative flex-1 min-w-[180px]">
            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">🔍</span>
            <input className="w-full pl-8 pr-3 py-1.5 text-sm border border-gray-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 transition-all" placeholder="Search projects or leads…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <select className="text-sm border border-gray-200 rounded-lg px-3 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-200 text-gray-600" value={teamF} onChange={e=>setTeamF(e.target.value)}>
            <option value="all">All Teams</option>
            {teams.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
          <select className="text-sm border border-gray-200 rounded-lg px-3 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-200 text-gray-600" value={stageF} onChange={e=>setStageF(e.target.value)}>
            <option value="all">All Stages</option>
            {stages.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
          <select className="text-sm border border-gray-200 rounded-lg px-3 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-200 text-gray-600" value={statusF} onChange={e=>setStatusF(e.target.value)}>
            <option value="all">All Status</option>
            {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
          {(search||teamF!=='all'||stageF!=='all'||statusF!=='all')&&(
            <button className="text-xs text-gray-400 hover:text-gray-600 transition-colors px-2 py-1.5 rounded-lg hover:bg-gray-100" onClick={()=>{setSearch('');setTeamF('all');setStageF('all');setStatusF('all');}}>Clear</button>
          )}
        </div>

        {/* Column Headers */}
        <div className="grid px-6 py-2 bg-gray-50/80 border-b border-gray-100 flex-shrink-0 text-xs font-medium text-gray-400 uppercase tracking-wider font-mono" style={{gridTemplateColumns:'2.5fr 1fr 1.5fr 1.8fr 1fr 90px'}}>
          <span>Project</span>
          <span>Stage</span>
          <span>Timeline</span>
          <span>Progress</span>
          <span>Lead</span>
          <span className="text-right">Remaining</span>
        </div>

        {/* Content */}
        <div className="flex-1 overflow-y-auto">
          {grouped.length===0&&(
            <div className="flex flex-col items-center justify-center py-20 text-gray-400">
              <div className="text-4xl mb-3">🔍</div>
              <div className="text-sm font-medium">No projects match</div>
              <div className="text-xs mt-1">Try adjusting your filters</div>
            </div>
          )}
          {grouped.map(([team,projs])=>(
            <div key={team}>
              <div className="flex items-center gap-3 px-6 py-3 bg-gray-50/50 border-b border-gray-100 sticky top-0 z-10">
                <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{background:teamColor(team)}}/>
                <span className="text-sm font-semibold text-gray-700">{team}</span>
                <span className="text-xs text-gray-400 bg-white border border-gray-200 px-2 py-0.5 rounded-full">{projs.length}</span>
              </div>
              {projs.map(p=>(
                <ActiveProjectRow key={p.title} p={p} refDate={refDate} editMode={editMode} onEdit={()=>{onClose();onEditProject&&onEditProject(p);}}/>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

          {p.title}
        </div>
        <div className="flex items-center gap-2 mt-0.5">
          <span className="text-xs text-gray-400">{p.assignee||'—'}</span>

// ─── Filter Bar ───────────────────────────────────────────────────────────────
function FilterBar({filters,setFilters,groups,assignees,stages,statuses,count,total,editMode,setEditMode,exportData,resetToDefault,onNewProject,onSearchPerson}){

  const hasDate=filters.startFrom||filters.startTo||filters.endFrom||filters.endTo;
  const hasAny=filters.group!=='all'||filters.assignee!=='all'||filters.status!=='all'||filters.stage!=='all'||filters.search||hasDate;

  return(
    <div className="bg-white border-b border-gray-100 px-6 py-3 flex items-center gap-2.5 flex-wrap">
      {/* Search */}
      <div className="relative">
        <span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-300 text-xs">🔍</span>
        <input className="pl-7 pr-3 py-1.5 text-xs border border-gray-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 transition-all w-44" placeholder="Search…" value={filters.search} onChange={e=>upd('search',e.target.value)}/>

      <FilterSelect label="Lead" value={filters.assignee} onChange={v=>upd('assignee',v)} options={assignees} allLabel="All Leads"/>
      <FilterSelect label="Status" value={filters.status} onChange={v=>upd('status',v)} options={statuses} allLabel="Any Status"/>
      <FilterSelect label="Stage" value={filters.stage} onChange={v=>upd('stage',v)} options={stages} allLabel="Any Stage"/>

      {/* Date filter */}
      <div className="relative">
        <button className={`flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium border rounded-lg transition-all ${hasDate?'bg-indigo-50 border-indigo-200 text-indigo-700':'bg-white border-gray-200 text-gray-500 hover:border-gray-300'}`} onClick={()=>setDateOpen(o=>!o)}>
          📅 Dates {hasDate&&<span className="w-1.5 h-1.5 rounded-full bg-indigo-500 flex-shrink-0"/>}
        </button>
        {dateOpen&&(
          <div className="absolute top-full left-0 mt-1 bg-white border border-gray-100 rounded-xl shadow-lg p-4 z-30 min-w-[220px]" onMouseLeave={()=>setDateOpen(false)}>
            {[['Start from','startFrom'],['Start to','startTo'],['End from','endFrom'],['End to','endTo']].map(([lbl,key])=>(

                <input type="date" className="text-xs border border-gray-200 rounded-lg px-2 py-1 flex-1 focus:outline-none focus:ring-1 focus:ring-indigo-300" value={filters[key]} onChange={e=>upd(key,e.target.value)}/>
              </div>
            ))}
            {hasDate&&<button className="mt-2 w-full text-xs text-gray-400 hover:text-gray-600 py-1" onClick={()=>{upd('startFrom','');upd('startTo','');upd('endFrom','');upd('endTo','');}}>Clear dates</button>}
          </div>
        )}
      </div>

      <div className="flex-1"/>
      <span className="text-xs font-mono text-gray-400"><b className="text-gray-700">{count}</b> of {total}</span>
      {hasAny&&<button className="px-3 py-1.5 text-xs text-gray-400 hover:text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50 transition-all" onClick={()=>setFilters({group:'all',assignee:'all',status:'all',stage:'all',search:'',startFrom:'',startTo:'',endFrom:'',endTo:''})}>Clear</button>}
      <button className={`px-3 py-1.5 text-xs font-semibold rounded-lg border transition-all ${editMode?'bg-indigo-600 text-white border-indigo-600':'bg-white text-gray-600 border-gray-200 hover:border-gray-300'}`} onClick={()=>setEditMode(!editMode)}>{editMode?'✓ Editing':'✎ Edit'}</button>
      {editMode&&<button className="px-3 py-1.5 text-xs font-semibold bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors" onClick={onNewProject}>+ New</button>}
      <button className="px-3 py-1.5 text-xs text-gray-500 border border-gray-200 rounded-lg hover:bg-gray-50 transition-all" onClick={()=>exportData('csv')}>↓ CSV</button>
      <button className="px-3 py-1.5 text-xs text-gray-500 border border-gray-200 rounded-lg hover:bg-gray-50 transition-all" onClick={()=>exportData('json')}>↓ JSON</button>

// ─── Gantt Chart ──────────────────────────────────────────────────────────────
function Gantt({grouped,timeline,pxPerDay,refDate,scale,setScale,onBarHover,editMode,onEditProject}){
  const scrollRef=useRef(null);
  if(!timeline||!grouped.length) return(
    <div className="bg-white rounded-2xl border border-gray-100 shadow-sm flex items-center justify-center h-48 text-gray-400 text-sm">
      No projects match the current filters.
    </div>
  );

  const totalDays=daysBetween(timeline.start,timeline.end);
  const totalWidth=totalDays*pxPerDay;
  const dateToPx=d=>daysBetween(timeline.start,d)*pxPerDay;
  const todayPx=dateToPx(refDate);

  const months=[];
  const cur=new Date(timeline.start);
  while(cur<timeline.end){ months.push(new Date(cur)); cur.setUTCMonth(cur.getUTCMonth()+1); }

  useEffect(()=>{ if(scrollRef.current) scrollRef.current.scrollLeft=Math.max(0,todayPx-200); },[pxPerDay]);

  return(
    <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
      <div className="flex items-center justify-between px-4 py-3 border-b border-gray-100">
        <div className="flex items-center gap-2">
          <span className="text-sm font-semibold text-gray-800">Timeline</span>
          <span className="text-xs text-gray-400 font-mono">{grouped.reduce((s,[,p])=>s+p.length,0)} projects</span>
          {editMode&&<span className="text-xs text-indigo-500 font-medium">· click bar to edit</span>}
        </div>
        <div className="flex items-center gap-1 bg-gray-100 rounded-lg p-0.5">
          {['day','week','month','quarter'].map(s=>(
            <button key={s} onClick={()=>setScale(s)}

function GanttRow({p,timeline,pxPerDay,totalWidth,refDate,onHover,editMode,onEdit}){
  const startPx=p.startDate?daysBetween(timeline.start,p.startDate)*pxPerDay:0;
  const endPx=p.endDate?daysBetween(timeline.start,p.endDate)*pxPerDay:startPx+30*pxPerDay;
  const barWidth=Math.max(8,endPx-startPx);
  const {pct,state}=computeProgress(p,refDate);
  const isActive=p.status!=='Done'&&p.startDate&&p.endDate&&new Date(refDate)>=new Date(p.startDate)&&new Date(refDate)<=new Date(p.endDate);
  const barBg=p.status==='Done'?'#10b981':state==='overdue'?'#ef4444':'#6366f1';
  const barFill=p.status==='Done'?'rgba(255,255,255,0.3)':state==='overdue'?'#dc2626':'rgba(255,255,255,0.25)';
  return(
    <div style={{display:'flex',borderBottom:'1px solid #f8fafc',background:isActive?'#fafeff':'white'}}
         onMouseLeave={()=>onHover(null)}>
      <div style={{width:340,flexShrink:0,display:'grid',gridTemplateColumns:'1fr 54px 44px',alignItems:'center',padding:'0 12px',height:40,position:'sticky',left:0,background:'inherit',borderRight:'1px solid #f1f5f9',zIndex:5,cursor:editMode?'pointer':'default'}}
           onClick={()=>editMode&&(onHover(null),onEdit(p))}>
        <div>
          <div style={{fontSize:11.5,fontWeight:500,color:'#1e293b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            <span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:p.priority==='High'?'#ef4444':p.priority==='Medium'?'#f59e0b':'#cbd5e1',marginRight:5,verticalAlign:'middle'}}/>
            {p.title}
          </div>
          <div style={{fontSize:10,color:'#94a3b8',marginTop:1}}>{p.assignee||'—'} · {p.stage||'—'}</div>
        </div>
        <div style={{textAlign:'center'}}>
          <span style={{fontSize:11,color:p.peopleCount>=4?'#6366f1':'#64748b',background:p.peopleCount>=4?'#eef2ff':'#f8fafc',border:`1px solid ${p.peopleCount>=4?'#c7d2fe':'#e2e8f0'}`,borderRadius:10,padding:'1px 6px',fontFamily:'JetBrains Mono, monospace'}}>{p.peopleCount}</span>
        </div>
        <div style={{textAlign:'right',fontSize:11,fontFamily:'JetBrains Mono, monospace',color:pct>=100?'#10b981':pct>=50?'#6366f1':'#94a3b8',fontWeight:600}}>{pct}%</div>
      </div>
      <div style={{width:totalWidth,position:'relative'}}>
        <div style={{position:'absolute',top:'50%',transform:'translateY(-50%)',left:startPx,width:barWidth,height:22,borderRadius:6,background:barBg,cursor:editMode?'pointer':'default',overflow:'hidden',boxShadow:'0 1px 3px rgba(0,0,0,0.15)'}}
             onMouseMove={e=>onHover({x:e.clientX,y:e.clientY,project:p,refDate,pct,state})}
             onClick={()=>editMode&&(onHover(null),onEdit(p))}>
          <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${pct}%`,background:barFill,borderRadius:6}}/>
          {barWidth>80&&<div style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',fontSize:10,color:'white',fontFamily:'JetBrains Mono, monospace',whiteSpace:'nowrap',opacity:0.9}}>{fmtShort(p.startDate)} → {p.endDate?fmtShort(p.endDate):'TBD'}</div>}
        </div>
      </div>
    </div>
  );
}

// ─── Donut Chart ──────────────────────────────────────────────────────────────
function DualDonut({inProgress,done,todo,tbc}){
  const total=inProgress+done+todo+tbc;
  if(!total) return <div className="flex items-center justify-center h-40 text-gray-400 text-xs">No projects</div>;
  const R=60,cx=80,cy=80,stroke=18,circ=2*Math.PI*R;
  const segs=[{v:inProgress,c:'#6366f1',label:'In-progress'},{v:done,c:'#10b981',label:'Done'},{v:todo,c:'#94a3b8',label:'To do'},{v:tbc,c:'#fbbf24',label:'TBC'}].filter(s=>s.v>0);
  let offset=0;
  return(
    <div className="flex items-center gap-4">
      <svg width={160} height={160} viewBox="0 0 160 160">
        <circle cx={cx} cy={cy} r={R} fill="none" stroke="#f1f5f9" strokeWidth={stroke}/>
        {segs.map((s,i)=>{ const len=(s.v/total)*circ; const el=<circle key={i} cx={cx} cy={cy} r={R} fill="none" stroke={s.c} strokeWidth={stroke} strokeDasharray={`${len} ${circ-len}`} strokeDashoffset={-offset} transform={`rotate(-90 ${cx} ${cy})`}/>; offset+=len; return el; })}
        <text x={cx} y={cy-4} textAnchor="middle" fontSize="26" fontWeight="700" fill="#0f172a">{total}</text>
        <text x={cx} y={cy+14} textAnchor="middle" fontSize="9" fill="#94a3b8" fontFamily="JetBrains Mono, monospace" letterSpacing="1">PROJECTS</text>
      </svg>
      <div className="space-y-2">
        {segs.map(s=>(
          <div key={s.label} className="flex items-center gap-2">
            <div className="w-2.5 h-2.5 rounded-sm flex-shrink-0" style={{background:s.c}}/>
            <span className="text-xs text-gray-500">{s.label}</span>
            <span className="text-xs font-bold text-gray-700 ml-auto pl-3">{s.v}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Person Panel ─────────────────────────────────────────────────────────────
function PersonPanel({person,projects,period,periodMode,onClose,onOpenProject}){
  const lc=person.toLowerCase();
  const mine=useMemo(()=>projects.filter(p=>p.people.includes(lc)),[projects,lc]);
  const inProgress=mine.filter(p=>['In-progress','To do','TBC'].includes(p.status));
  const done=mine.filter(p=>p.status==='Done');
  const periodDays=daysBetween(period.start,period.end)+1;
  const periodProjects=mine.filter(p=>isActiveInRange(p,period.start,period.end));
  let effortDays=0;
  periodProjects.forEach(p=>{ const ps=p.startDate?new Date(p.startDate):period.start, pe=p.endDate?new Date(p.endDate):period.end, os=ps>period.start?ps:period.start, oe=pe<period.end?pe:period.end; effortDays+=Math.max(1,daysBetween(os,oe)+1)/Math.max(1,p.peopleCount); });
  const effortPct=Math.round((effortDays/periodDays)*100);
  const team=Object.entries(TEAM_ROSTERS).find(([k,arr])=>arr.includes(lc))?.[0]||'—';
  useEffect(()=>{ const h=e=>{if(e.key==='Escape')onClose();}; window.addEventListener('keydown',h); return()=>window.removeEventListener('keydown',h); },[onClose]);
  return(
    <div className="fixed inset-0 z-50 flex items-start justify-center pt-8 px-4" style={{animation:'fadeIn 180ms ease'}}>
      <div className="absolute inset-0 bg-black/30 backdrop-blur-sm" onClick={onClose}/>
      <div className="relative bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[88vh] flex flex-col overflow-hidden" style={{animation:'slideUp 220ms ease'}}>
        <div className="flex items-center justify-between px-6 py-5 border-b border-gray-100">
          <div className="flex items-center gap-4">
            <Avatar name={person} size="xl" />
            <div>
              <div className="text-xs text-gray-400 font-mono">{team} · Member</div>
              <div className="text-xl font-bold text-gray-900 capitalize mt-0.5">{person}</div>
              <div className="text-sm text-gray-400 mt-0.5">{mine.length} projects · {inProgress.length} active · {done.length} done</div>
            </div>
          </div>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:bg-gray-100 transition-all text-lg">✕</button>
        </div>
        <div className="flex-1 overflow-y-auto p-6">
          <div className="grid grid-cols-[200px_1fr] gap-6">
            <div>
              <DualDonut inProgress={inProgress.length} done={done.length} todo={mine.filter(p=>p.status==='To do').length} tbc={mine.filter(p=>p.status==='TBC').length}/>
              <div className="mt-4 p-3 bg-gray-50 rounded-xl">
                <div className="text-xs text-gray-400 mb-2">Effort · {period.label}</div>
                <div className={`text-2xl font-bold font-mono ${effortPct>=100?'text-red-600':effortPct>=70?'text-amber-600':'text-indigo-600'}`}>{effortPct}%</div>
                <div className="mt-2 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                  <div className="h-full rounded-full" style={{width:`${Math.min(100,effortPct)}%`,background:effortPct>=100?'#ef4444':effortPct>=70?'#f59e0b':'#6366f1'}}/>
                </div>
                <div className="text-xs text-gray-400 mt-1">{periodProjects.length} project(s) this {periodMode}</div>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-4">
              {[{label:'In Progress',projs:inProgress,color:'#6366f1'},{label:'Done',projs:done,color:'#10b981'}].map(({label,projs,color})=>(
                <div key={label}>
                  <div className="flex items-center gap-2 mb-3">
                    <div className="w-2 h-2 rounded-full" style={{background:color}}/>
                    <span className="text-xs font-semibold text-gray-600">{label} ({projs.length})</span>
                  </div>
                  <div className="space-y-2">
                    {projs.length===0&&<div className="text-xs text-gray-300 py-2">None</div>}
                    {projs.map(p=>{
                      const {pct,state}=computeProgress(p,iso(today()));
                      return(
                        <div key={p.title} className="p-3 bg-gray-50 rounded-xl hover:bg-gray-100 cursor-pointer transition-colors" onClick={()=>onOpenProject(p)}>
                          <div className="flex items-center gap-1.5 mb-1">

                            <span className="text-xs font-medium text-gray-800 truncate">{p.title}</span>
                          </div>
                          <div className="flex items-center gap-1.5 mb-2">
                            <StageBadge stage={p.stage}/>
                            {state==='overdue'&&<span className="text-xs text-red-500 font-medium">OVERDUE</span>}

                          <div className="h-1 bg-gray-200 rounded-full overflow-hidden">

              ))}

  return(
    <div className="fixed inset-0 z-50 flex items-start justify-center pt-8 px-4" style={{animation:'fadeIn 180ms ease'}}>
      <div className="absolute inset-0 bg-black/30 backdrop-blur-sm" onClick={onClose}/>
      <div className="relative bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[88vh] flex flex-col overflow-hidden" style={{animation:'slideUp 220ms ease'}}>
        <div className="flex items-center justify-between px-6 py-5 border-b border-gray-100">
          <div>
            <div className="text-xs text-gray-400 font-mono uppercase tracking-wider">{isNew?'New project':'Edit project'}</div>
            <div className="text-lg font-semibold text-gray-900 mt-0.5">{form.title||'Untitled'}</div>
          </div>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:bg-gray-100 transition-all text-lg">✕</button>
        </div>
        <div className="flex-1 overflow-y-auto p-6">
          <div className="grid grid-cols-2 gap-4">
            <Field label="Title" full><input className={inp} value={form.title} onChange={e=>set('title',e.target.value)} placeholder="Project title…"/></Field>
            <Field label="Team"><select className={inp} value={form.group} onChange={e=>onGroupChange(e.target.value)}>{TEAMS_LIST.map(t=><option key={t} value={t}>{t}</option>)}</select></Field>
            <Field label="Stage"><select className={inp} value={form.stage} onChange={e=>set('stage',e.target.value)}><option value="">—</option>{STAGES_LIST.map(s=><option key={s} value={s}>{s}</option>)}</select></Field>
            <Field label="Status"><select className={inp} value={form.status} onChange={e=>set('status',e.target.value)}>{STATUSES.map(s=><option key={s} value={s}>{s}</option>)}</select></Field>
            <Field label="Priority"><select className={inp} value={form.priority} onChange={e=>set('priority',e.target.value)}>{PRIORITIES.map(s=><option key={s} value={s}>{s}</option>)}</select></Field>
            <Field label="Lead (Assignee)"><input className={inp} value={form.assignee} onChange={e=>set('assignee',e.target.value)} placeholder="e.g. Akshaya"/></Field>
            <Field label="QA / QC"><select className={inp} value={form.qaqc} onChange={e=>set('qaqc',e.target.value)}>{QAQC_LIST.map(s=><option key={s} value={s}>{s}</option>)}{form.qaqc&&!QAQC_LIST.includes(form.qaqc)&&<option value={form.qaqc}>{form.qaqc}</option>}</select></Field>
            <Field label="Start Date"><input type="date" className={inp} value={form.startDate||''} onChange={e=>set('startDate',e.target.value)}/></Field>
            <Field label="End Date"><input type="date" className={inp} value={form.endDate||''} onChange={e=>set('endDate',e.target.value)}/></Field>
            <Field label="Working Team" full>
              <div className="border border-gray-200 rounded-xl p-3 space-y-2">
                <div className="flex flex-wrap gap-1.5">
                  {peopleArr.length===0&&<span className="text-xs text-gray-300">No one assigned yet</span>}
                  {peopleArr.map(person=>(
                    <span key={person} className="inline-flex items-center gap-1.5 bg-indigo-50 text-indigo-700 border border-indigo-100 px-2.5 py-1 rounded-full text-xs font-medium">
                      <Avatar name={person} size="sm"/>
                      {person}
                      <button className="text-indigo-400 hover:text-indigo-600 ml-0.5" onClick={()=>removePerson(person)}>×</button>
                    </span>
                  ))}
                </div>
                <div className="flex gap-2">
                  <input className={`flex-1 ${inp}`} placeholder="Add person…" value={newPerson} onChange={e=>setNewPerson(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addPerson();}}}/>
                  <button className="px-3 py-2 text-xs font-medium bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors" onClick={addPerson}>Add</button>
                </div>
                {roster.length>0&&(
                  <div>
                    <div className="flex items-center gap-2 mb-1.5">
                      <span className="text-xs text-gray-400">{form.group} roster</span>
                      <button className="text-xs text-indigo-500 hover:text-indigo-700" onClick={()=>{ const ex=new Set(parsePeople(form.team).map(x=>x.toLowerCase())); const toAdd=roster.filter(p=>!ex.has(p)); set('team',[...parsePeople(form.team),...toAdd.map(cap)].join(', ')); }}>+ Add all</button>
                    </div>
                    <div className="flex flex-wrap gap-1">
                      {roster.map(p=>{ const inT=parsePeople(form.team).map(x=>x.toLowerCase()).includes(p); return <button key={p} disabled={inT} className={`text-xs px-2.5 py-1 rounded-full border transition-all ${inT?'border-green-200 bg-green-50 text-green-600':'border-gray-200 bg-white text-gray-500 hover:border-indigo-200 hover:text-indigo-600'}`} onClick={()=>!inT&&(()=>{const ex=parsePeople(form.team);if(!ex.map(x=>x.toLowerCase()).includes(p))set('team',[...ex,cap(p)].join(', '));})()}>  {inT?'✓':'+' } {cap(p)}</button>; })}
                    </div>
                  </div>
                )}
              </div>
              <div className="text-xs text-gray-400 mt-1">{peopleArr.length} people assigned</div>
            </Field>
            <Field label="Description / Notes" full><textarea className={inp} rows={3} value={form.description} onChange={e=>set('description',e.target.value)}/></Field>
          </div>
        </div>
        <div className="flex items-center gap-3 px-6 py-4 border-t border-gray-100">
          {!isNew&&<button className="px-4 py-2 text-xs font-medium text-red-600 border border-red-100 rounded-lg hover:bg-red-50 transition-colors" onClick={onDelete}>🗑 Delete</button>}
          <div className="flex-1"/>
          <button className="px-4 py-2 text-xs font-medium text-gray-500 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors" onClick={onClose}>Cancel</button>
          <button className="px-5 py-2 text-xs font-semibold bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors" onClick={handleSave}>{isNew?'Add project':'Save changes'}</button>
        </div>
      </div>
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard(props){
  const {projects,refDate,filters,setFilters,editMode,periodMode} = props;
  const groups   = useMemo(()=>[...new Set(projects.map(p=>p.group))].filter(Boolean).sort(),[projects]);
  const assignees= useMemo(()=>[...new Set(projects.map(p=>p.assignee))].filter(Boolean).sort(),[projects]);
  const stages   = useMemo(()=>[...new Set(projects.map(p=>p.stage))].filter(Boolean).sort(),[projects]);
  const statuses = useMemo(()=>[...new Set(projects.map(p=>p.status))].filter(Boolean),[projects]);

  const filtered = useMemo(()=>projects.filter(p=>{
    if(filters.group!=='all'&&p.group!==filters.group)return false;
    if(filters.assignee!=='all'&&p.assignee!==filters.assignee)return false;
    if(filters.status!=='all'&&p.status!==filters.status)return false;
    if(filters.stage!=='all'&&p.stage!==filters.stage)return false;
    if(filters.startFrom&&(!p.startDate||new Date(p.startDate)<new Date(filters.startFrom)))return false;
    if(filters.startTo&&(!p.startDate||new Date(p.startDate)>new Date(filters.startTo)))return false;
    if(filters.endFrom&&(!p.endDate||new Date(p.endDate)<new Date(filters.endFrom)))return false;
    if(filters.endTo&&(!p.endDate||new Date(p.endDate)>new Date(filters.endTo)))return false;
    if(filters.search){ const q=filters.search.toLowerCase(); if(!(p.title||'').toLowerCase().includes(q)&&!(p.assignee||'').toLowerCase().includes(q)&&!(p.team||'').toLowerCase().includes(q)&&!(p.description||'').toLowerCase().includes(q))return false; }
    return true;
  }),[projects,filters]);

  const period=useMemo(()=>rangeForPeriod(refDate,periodMode),[refDate,periodMode]);
  const pxPerDay={day:24,week:8,month:3.5,quarter:1.6}[props.scale]||3.5;

  const kpis=useMemo(()=>{
    const activeInPeriod=filtered.filter(p=>isActiveInRange(p,period.start,period.end));
    const doneCount=filtered.filter(p=>p.status==='Done').length;
    const overdueCount=filtered.filter(p=>p.status!=='Done'&&p.endDate&&new Date(p.endDate)<new Date(refDate)).length;
    let sumPct=0; filtered.forEach(p=>{sumPct+=computeProgress(p,refDate).pct;});
    const overallPct=filtered.length?Math.round(sumPct/filtered.length):0;
    const wp=new Set(); activeInPeriod.forEach(p=>p.people.forEach(x=>wp.add(x)));
    return {total:filtered.length,activeToday:activeInPeriod.length,doneCount,overdueCount,overallPct,peopleActive:wp.size,refDate};
  },[filtered,refDate,period]);

  const resourceLoad=useMemo(()=>{
    const periodDays=daysBetween(period.start,period.end)+1, map=new Map();
    filtered.forEach(p=>{ if(!isActiveInRange(p,period.start,period.end))return; const ps=p.startDate?new Date(p.startDate):period.start, pe=p.endDate?new Date(p.endDate):period.end, os=ps>period.start?ps:period.start, oe=pe<period.end?pe:period.end, days=Math.max(1,daysBetween(os,oe)+1), share=1/Math.max(1,p.peopleCount); p.people.forEach(person=>{ if(!map.has(person))map.set(person,{count:0,projects:[],effortDays:0}); const r=map.get(person); r.count++;r.projects.push({title:p.title,days,share,status:p.status,group:p.group,stage:p.stage});r.effortDays+=days*share; }); });
    return [...map.entries()].map(([name,r])=>({name,count:r.count,projects:r.projects,pct:Math.round((r.effortDays/periodDays)*100)})).sort((a,b)=>b.pct-a.pct);
  },[filtered,period]);

  const stageBreakdown=useMemo(()=>{ const m=new Map(); filtered.forEach(p=>{ if(!p.stage)return; if(!m.has(p.stage))m.set(p.stage,{total:0,done:0}); const s=m.get(p.stage);s.total++;if(p.status==='Done')s.done++; }); return [...m.entries()].map(([stage,d])=>({stage,...d})).sort((a,b)=>b.total-a.total); },[filtered]);

  const timeline=useMemo(()=>{
    if(!filtered.length)return null;
    let min=Infinity,max=-Infinity;
    filtered.forEach(p=>{ if(p.startDate){const s=new Date(p.startDate).getTime();if(s<min)min=s;} if(p.endDate){const e=new Date(p.endDate).getTime();if(e>max)max=e;}else if(p.startDate){const s=new Date(p.startDate).getTime();if(s>max)max=s;} });
    if(!isFinite(min))min=Date.now(); if(!isFinite(max))max=min+90*DAY_MS;
    min-=14*DAY_MS;max+=14*DAY_MS;
    const minD=new Date(min);minD.setUTCDate(1); const maxD=new Date(max);maxD.setUTCMonth(maxD.getUTCMonth()+1,1);
    return{start:minD,end:maxD};
  },[filtered]);

  const sorted=useMemo(()=>[...filtered].sort((a,b)=>{if(a.group!==b.group)return(a.group||'').localeCompare(b.group||'');return new Date(a.startDate||0)-new Date(b.startDate||0);}),[filtered]);
  const grouped=useMemo(()=>{ const g=new Map(); sorted.forEach(p=>{const k=p.group||'OTHER';if(!g.has(k))g.set(k,[]);g.get(k).push(p);}); return [...g.entries()]; },[sorted]);

  const onClickPerson=useCallback(name=>props.setFocusPerson(name),[props]);

  return(
    <div className="min-h-screen bg-gray-50" style={{fontFamily:"'Inter', -apple-system, system-ui, sans-serif"}}>
      <Header refDate={refDate} setRefDate={props.setRefDate} period={period}/>
      <div className="px-6 pt-5 pb-0">
        <SummaryCards kpis={kpis} period={period} onActiveClick={()=>props.setShowActiveModal(true)} onOverdueClick={()=>props.setShowOverdueModal(true)}/>
      </div>
      <FilterBar filters={filters} setFilters={setFilters} groups={groups} assignees={assignees} stages={stages} statuses={statuses}
        count={filtered.length} total={projects.length} editMode={editMode} setEditMode={props.setEditMode}
        exportData={props.exportData} resetToDefault={props.resetToDefault}
        onNewProject={()=>{const t=iso(today()),endD=new Date();endD.setMonth(endD.getMonth()+3);props.setEditingProject({title:'',qaqc:'TBC',assignee:'',team:'',status:'To do',priority:'Medium',description:'',group:'TEAM1',stage:'SD',startDate:t,endDate:iso(endD),milestones:[],__isNew:true});}}
        onSearchPerson={onClickPerson}
      />
      <div className="grid p-6 gap-5" style={{gridTemplateColumns:'1fr 300px',alignItems:'start'}}>
        <Gantt grouped={grouped} timeline={timeline} pxPerDay={pxPerDay} refDate={refDate} scale={props.scale} setScale={props.setScale} onBarHover={props.setTooltip} editMode={editMode} onEditProject={props.setEditingProject}/>
        <div className="space-y-4">
          <ResourcePanel resourceLoad={resourceLoad} period={period} periodMode={periodMode} setPeriodMode={props.setPeriodMode} onPersonClick={onClickPerson}/>
          <StagePanel stageBreakdown={stageBreakdown}/>
          <LegendPanel/>
        </div>
      </div>

      {props.tooltip&&!props.editingProject&&!props.focusPerson&&<Tooltip {...props.tooltip}/>}

      {props.showActiveModal&&(
        <ActivePeriodModal projects={filtered} period={period} refDate={refDate} onClose={()=>props.setShowActiveModal(false)}
          editMode={editMode} onEditProject={props.setEditingProject}
          title="Active This Period" filterFn={null}/>
      )}
      {props.showOverdueModal&&(
        <ActivePeriodModal projects={projects} period={period} refDate={refDate} onClose={()=>props.setShowOverdueModal(false)}
          editMode={editMode} onEditProject={props.setEditingProject}
          title="Overdue Projects"
          filterFn={p=>p.status!=='Done'&&p.endDate&&new Date(p.endDate)<new Date(refDate)}/>
      )}
      {props.editingProject&&(
        <EditModal project={props.editingProject} onClose={()=>props.setEditingProject(null)}
          onSave={patch=>{props.updateProject(props.editingProject.title,patch);props.setEditingProject(null);}}
          onDelete={()=>props.deleteProject(props.editingProject.title)}
          isNew={props.editingProject.__isNew}
          onAdd={newP=>{props.addProject(newP);props.setEditingProject(null);}}/>
      )}
      {props.focusPerson&&(
        <PersonPanel person={props.focusPerson} projects={projects} period={period} periodMode={periodMode}
          onClose={()=>props.setFocusPerson(null)}
          onOpenProject={p=>{props.setFocusPerson(null);props.setEditingProject(p);}}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  </script>
</body>
</html>
