<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1400">
  <title>BIM Project Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style data-src-loc="423:430:34256">
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f6f7f9;
  --panel: #ffffff;
  --ink: #0f172a;
  --ink-2: #334155;
  --ink-3: #64748b;
  --ink-4: #94a3b8;
  --line: #e2e8f0;
  --line-2: #edf0f4;
  --accent: #4f46e5;
  --accent-soft: #eef2ff;
  --green: #059669;
  --green-soft: #ecfdf5;
  --amber: #d97706;
  --amber-soft: #fffbeb;
  --red: #dc2626;
  --red-soft: #fef2f2;
  --violet: #7c3aed;
  --teal: #0d9488;
  --slate: #475569;
  --row-alt: #fafbfc;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  font-size: 13px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}

.mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }

.app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ============ HEADER ============ */
.header {
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  padding: 18px 28px 14px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-top {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 16px;
}
.brand {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.brand-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  text-transform: uppercase;
}
.brand-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.brand-meta {
  font-size: 11.5px;
  color: var(--ink-3);
  margin-top: 2px;
}

.date-control {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 300px;
}
.date-control-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.date-control-label::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.date-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.date-input {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  padding: 8px 12px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--panel);
  color: var(--ink);
  outline: none;
  transition: border-color .15s;
}
.date-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.date-btn {
  padding: 8px 10px;
  border: 1px solid var(--line);
  background: var(--panel);
  border-radius: 6px;
  font-size: 11.5px;
  color: var(--ink-2);
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.date-btn:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.date-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.date-btn.primary:hover { background: #4338ca; }

/* ============ KPIs ============ */
.kpis {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
}
.kpi {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
  overflow: hidden;
}
.kpi-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink-3);
  text-transform: uppercase;
}
.kpi-value {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--ink);
  font-feature-settings: 'tnum';
}
.kpi-sub {
  font-size: 11px;
  color: var(--ink-3);
}
.kpi.accent { background: var(--accent-soft); border-color: #c7d2fe; }
.kpi.accent .kpi-value { color: var(--accent); }
.kpi-bar {
  height: 4px;
  background: var(--line-2);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 4px;
}
.kpi-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .25s;
}

/* ============ FILTERS ============ */
.filters {
  display: flex;
  gap: 10px;
  padding: 12px 28px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  align-items: center;
  flex-wrap: wrap;
}
.filter {
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-label {
  font-size: 11px;
  color: var(--ink-3);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.filter select, .filter input {
  font-family: inherit;
  font-size: 12px;
  padding: 5px 8px;
  border: 1px solid var(--line);
  border-radius: 5px;
  background: var(--panel);
  color: var(--ink);
  outline: none;
}
.filter select:focus, .filter input:focus { border-color: var(--accent); }
.search-input { width: 200px; }
.filter-spacer { flex: 1; }
.count-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-3);
}
.count-badge b { color: var(--ink); font-weight: 600; }

/* ============ MAIN LAYOUT ============ */
.main {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 16px;
  padding: 16px 28px 28px;
  flex: 1;
  align-items: start;
}

/* ============ GANTT ============ */
.gantt {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
}
.gantt-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
}
.gantt-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.gantt-scale-toggle {
  display: flex;
  gap: 2px;
  background: var(--bg);
  padding: 2px;
  border-radius: 6px;
}
.scale-btn {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  padding: 4px 10px;
  border: none;
  background: transparent;
  color: var(--ink-3);
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: 0.04em;
}
.scale-btn.active { background: var(--panel); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }

.gantt-scroll {
  overflow-x: auto;
  overflow-y: auto;
  max-height: calc(100vh - 320px);
  position: relative;
}

.gantt-grid {
  position: relative;
  min-width: 100%;
}

/* Timeline axis */
.axis {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  display: flex;
}
.axis-left {
  flex-shrink: 0;
  width: 340px;
  border-right: 1px solid var(--line);
  padding: 0;
  background: var(--panel);
  position: sticky;
  left: 0;
  z-index: 11;
  display: flex;
  align-items: stretch;
}
.axis-left-inner {
  display: grid;
  grid-template-columns: 1fr 54px 44px;
  align-items: center;
  width: 100%;
  height: 44px;
  padding: 0 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  text-transform: uppercase;
}
.axis-right {
  flex: 1;
  position: relative;
  height: 44px;
}
.axis-month {
  position: absolute;
  top: 0;
  height: 100%;
  border-left: 1px solid var(--line);
  padding: 6px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--ink-2);
  letter-spacing: 0.04em;
  display: flex;
  flex-direction: column;
  justify-content: center;
  pointer-events: none;
}
.axis-month .mname { font-weight: 600; color: var(--ink); }
.axis-month .myear { color: var(--ink-4); font-size: 9.5px; margin-top: 1px; }

/* Group header row */
.grp-row {
  display: flex;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
}
.grp-left {
  width: 340px;
  flex-shrink: 0;
  padding: 8px 12px;
  border-right: 1px solid var(--line);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--ink-2);
  position: sticky;
  left: 0;
  background: var(--bg);
  z-index: 5;
  display: flex;
  align-items: center;
  gap: 8px;
  text-transform: uppercase;
}
.grp-dot {
  width: 8px; height: 8px;
  border-radius: 2px;
}
.grp-count {
  color: var(--ink-4);
  font-weight: 500;
  margin-left: auto;
}
.grp-right {
  flex: 1;
  position: relative;
  min-height: 26px;
}

/* Project row */
.row {
  display: flex;
  border-bottom: 1px solid var(--line-2);
  position: relative;
}
.row:hover { background: var(--row-alt); }
.row.active-today { background: rgba(79, 70, 229, 0.025); }

.row-left {
  width: 340px;
  flex-shrink: 0;
  padding: 8px 10px 8px 18px;
  border-right: 1px solid var(--line);
  position: sticky;
  left: 0;
  background: inherit;
  z-index: 4;
  display: grid;
  grid-template-columns: 1fr 54px 44px;
  align-items: center;
  gap: 8px;
  min-height: 42px;
}
.row:hover .row-left { background: var(--row-alt); }
.row.active-today .row-left { background: rgba(79, 70, 229, 0.04); }

.proj-title {
  font-size: 12px;
  color: var(--ink);
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.25;
}
.proj-sub {
  font-size: 10.5px;
  color: var(--ink-3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
  margin-top: 1px;
}
.proj-title-wrap { min-width: 0; overflow: hidden; }

.people-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 2px 6px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--ink-2);
  font-weight: 500;
  height: 20px;
}
.people-chip svg { width: 10px; height: 10px; flex-shrink: 0; }
.people-chip.high { background: var(--accent-soft); border-color: #c7d2fe; color: var(--accent); }

.pct-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  font-weight: 600;
  text-align: right;
  font-feature-settings: 'tnum';
  color: var(--ink-2);
}
.pct-chip.done { color: var(--green); }
.pct-chip.ontrack { color: var(--accent); }
.pct-chip.overdue { color: var(--red); }

.row-right {
  flex: 1;
  position: relative;
  min-height: 42px;
}

/* Timeline bar */
.bar {
  position: absolute;
  top: 10px;
  height: 22px;
  border-radius: 4px;
  cursor: pointer;
  overflow: hidden;
  transition: transform .12s;
  display: flex;
  align-items: center;
  padding: 0 8px;
  font-size: 10px;
  color: white;
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap;
  font-weight: 500;
}
.bar:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(15,23,42,0.15); z-index: 3; }
.bar-fill {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  border-radius: 4px 0 0 4px;
  pointer-events: none;
}
.bar-label { position: relative; z-index: 2; overflow: hidden; text-overflow: ellipsis; }

/* Bar status variations */
.bar.status-todo { background: #cbd5e1; color: var(--ink-2); }
.bar.status-todo .bar-fill { background: #94a3b8; }
.bar.status-inprogress { background: #dbeafe; color: var(--accent); }
.bar.status-inprogress .bar-fill { background: var(--accent); opacity: 0.9; }
.bar.status-done { background: var(--green-soft); color: var(--green); }
.bar.status-done .bar-fill { background: var(--green); opacity: 0.85; }
.bar.status-tbc { background: #f1f5f9; color: var(--ink-3); }
.bar.status-tbc .bar-fill { background: #94a3b8; opacity: 0.5; }
.bar.overdue { box-shadow: inset 0 0 0 1.5px var(--red); }
.bar.overdue .bar-fill { background: var(--red); opacity: 0.9; }
.bar.overdue { color: var(--red); background: var(--red-soft); }

/* Milestone markers */
.milestone {
  position: absolute;
  top: 7px;
  width: 10px;
  height: 10px;
  transform: rotate(45deg);
  background: var(--ink);
  border: 1.5px solid white;
  z-index: 2;
  pointer-events: none;
}

/* Today vertical line */
.today-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--accent);
  z-index: 6;
  pointer-events: none;
}
.today-line::before {
  content: '';
  position: absolute;
  top: -4px;
  left: -4px;
  width: 10px;
  height: 10px;
  background: var(--accent);
  border-radius: 50%;
  border: 2px solid white;
}
.today-line::after {
  content: attr(data-label);
  position: absolute;
  top: 2px;
  left: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  background: var(--accent);
  color: white;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 600;
  white-space: nowrap;
  letter-spacing: 0.04em;
}

/* Month gridlines */
.gridline {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--line-2);
  pointer-events: none;
}
.gridline.quarter { background: var(--line); }

/* Weekend stripes (day scale only) */
.weekend-stripe {
  position: absolute;
  top: 0;
  bottom: 0;
  background: rgba(15, 23, 42, 0.02);
  pointer-events: none;
}

/* ============ SIDEBAR ============ */
.sidebar {
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: sticky;
  top: 200px;
}
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
}
.card-header {
  padding: 12px 14px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: -0.005em;
}
.card-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* Resource loading */
.resource-list {
  padding: 4px 0 8px;
  max-height: 400px;
  overflow-y: auto;
}
.resource-row {
  display: grid;
  grid-template-columns: 22px 1fr 34px 70px;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  font-size: 11.5px;
}
.resource-row:hover { background: var(--row-alt); }
.avatar {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9.5px;
  font-weight: 600;
  color: white;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: -0.02em;
}
.resource-name {
  text-transform: capitalize;
  color: var(--ink);
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.resource-count {
  text-align: right;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-2);
  font-weight: 600;
  font-feature-settings: 'tnum';
}
.load-bar {
  height: 4px;
  background: var(--line-2);
  border-radius: 2px;
  overflow: hidden;
}
.load-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
}
.load-bar-fill.high { background: var(--amber); }
.load-bar-fill.vhigh { background: var(--red); }

/* Legend */
.legend {
  padding: 10px 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--ink-2);
}
.legend-swatch {
  width: 18px;
  height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* Stage breakdown */
.stage-list { padding: 4px 14px 14px; display: flex; flex-direction: column; gap: 6px; }
.stage-row {
  display: grid;
  grid-template-columns: 1fr 30px;
  align-items: center;
  gap: 8px;
  font-size: 11.5px;
}
.stage-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.04em;
  color: var(--ink-2);
}
.stage-bar {
  height: 14px;
  background: var(--line-2);
  border-radius: 3px;
  position: relative;
  overflow: hidden;
}
.stage-bar-fill {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
}
.stage-bar-label {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  color: var(--ink);
}

/* Tooltip */
.tooltip {
  position: fixed;
  background: var(--ink);
  color: white;
  padding: 10px 12px;
  border-radius: 6px;
  font-size: 11.5px;
  max-width: 340px;
  z-index: 100;
  pointer-events: none;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  line-height: 1.5;
}
.tooltip-title { font-weight: 600; margin-bottom: 4px; font-size: 12px; }
.tooltip-meta {
  display: flex;
  gap: 10px;
  margin-bottom: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: #a5b4fc;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.tooltip-body {
  color: #cbd5e1;
  font-size: 11px;
  margin-top: 4px;
  max-height: 110px;
  overflow: hidden;
}
.tooltip-row {
  display: flex;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  margin-top: 2px;
}
.tooltip-row span:first-child { color: #94a3b8; }

/* Empty state */
.empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--ink-3);
  font-size: 13px;
}

/* Priority dot */
.priority-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: middle;
}
.priority-high { background: var(--red); }
.priority-medium { background: var(--amber); }
.priority-low { background: var(--ink-4); }

/* Status pill */
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 1px 6px;
  border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-weight: 600;
  height: 16px;
}
.status-pill.inprogress { background: var(--accent-soft); color: var(--accent); }
.status-pill.done { background: var(--green-soft); color: var(--green); }
.status-pill.todo { background: var(--bg); color: var(--ink-3); }
.status-pill.tbc { background: #f1f5f9; color: var(--ink-3); }

/* ============ MODAL ============ */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.5);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--panel);
  border-radius: 12px;
  width: 100%;
  max-width: 720px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);

function computeProgress(p, refDate) {
  const start = p.startDate ? new Date(p.startDate) : null;
  const end = p.endDate ? new Date(p.endDate) : null;
  const ref = new Date(refDate);
  if (p.status === 'Done') return {
    pct: 100,
    state: 'done'
  };
  if (!start || !end) return {
    pct: 0,
    state: 'unknown'
  };
  if (ref <= start) return {
    pct: 0,
    state: 'upcoming'
  };
  if (ref >= end) return {
    pct: 100,
    state: p.status === 'Done' ? 'done' : 'overdue'
  };
  const pct = Math.max(0, Math.min(100, Math.round((ref - start) / (end - start) * 100)));
  return {
    pct,
    state: 'ontrack'
  };
}
function isActiveInRange(p, rangeStart, rangeEnd) {
  if (p.status === 'Done') {
    if (!p.endDate) return false;

  const s = p.startDate ? new Date(p.startDate) : null;

// ============ PERSON PANEL (pie chart + projects + leaves) ============
function PersonPanel({
  person,
  projects,
  leaves,
  addLeave,
  updateLeave,
  deleteLeave,
  importLeaveCSV,
  period,
  periodMode,
  refDate,
  onClose,
  onOpenProject
}) {
  const lcPerson = person.toLowerCase();
  const [activeTab, setActiveTab] = useState('work'); // 'work' | 'leaves'

  // Work as team member
  const memberOf = useMemo(() => projects.filter(p => p.people.includes(lcPerson)), [projects, lcPerson]);
  // Work as QA/QC
  const qaqcOf = useMemo(() => projects.filter(p => (p.qaqc || '').toLowerCase() === lcPerson), [projects, lcPerson]);
  // Work as lead
  const leadOf = useMemo(() => projects.filter(p => (p.assignee || '').toLowerCase() === lcPerson), [projects, lcPerson]);

  // Role detection
  const team = Object.entries(TEAM_ROSTERS).find(([k, arr]) => arr.includes(lcPerson))?.[0];
  const isQAQC = QAQC_LIST.map(q => q.toLowerCase()).includes(lcPerson);
  const isLead = leadOf.length > 0;

  // Combined set of projects for this person (union of member + qaqc + lead roles)
  const mine = useMemo(() => {
    const byTitle = new Map();
    memberOf.forEach(p => byTitle.set(p.title, {
      ...p,
      _role: 'Member'
    }));
    qaqcOf.forEach(p => {
      const ex = byTitle.get(p.title);
      byTitle.set(p.title, {
        ...p,
        _role: ex ? ex._role + ' + QA/QC' : 'QA/QC'
      });
    });
    leadOf.forEach(p => {
      const ex = byTitle.get(p.title);
      byTitle.set(p.title, {
        ...p,
        _role: ex ? ex._role + ' + Lead' : 'Lead'
      });
    });
    return [...byTitle.values()];
  }, [memberOf, qaqcOf, leadOf]);
  const inProgress = mine.filter(p => p.status === 'In-progress' || p.status === 'To do' || p.status === 'TBC');
  const done = mine.filter(p => p.status === 'Done');

  // Effort calc for period (only as team member, since QAQC isn't counted as execution effort)
  const periodDays = daysBetween(period.start, period.end) + 1;
  const periodProjects = memberOf.filter(p => isActiveInRange(p, period.start, period.end));
  let effortDays = 0;
  periodProjects.forEach(p => {
    const pStart = p.startDate ? new Date(p.startDate) : period.start;
    const pEnd = p.endDate ? new Date(p.endDate) : period.end;
    const overlapStart = pStart > period.start ? pStart : period.start;
    const overlapEnd = pEnd < period.end ? pEnd : period.end;
    const days = Math.max(1, daysBetween(overlapStart, overlapEnd) + 1);
    effortDays += days / Math.max(1, p.peopleCount);
  });

// ============ PROJECT LIST PANEL (Active / Overdue drill-down from KPIs) ============
function ProjectListPanel({
  title,
  subtitle,
  projects,
  tone,
  emptyMsg,
  refDate,
  onClose,
  onOpenProject,
  onOpenPerson
}) {
  const [sort, setSort] = useState('start'); // start | end | progress | title | group
  const [groupBy, setGroupBy] = useState('team'); // team | none | status | stage

  useEffect(() => {
    const onKey = e => {
      if (e.key === 'Escape') onClose();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);
  const enriched = useMemo(() => projects.map(p => {
    const prog = computeProgress(p, refDate);
    const overdue = p.status !== 'Done' && p.endDate && new Date(p.endDate) < new Date(refDate);
    const daysLeft = p.endDate ? daysBetween(refDate, p.endDate) : null;
    return {
      ...p,
      _pct: prog.pct,
      _overdue: overdue,
      _daysLeft: daysLeft
    };
  }), [projects, refDate]);
  const sorted = useMemo(() => {
    const arr = [...enriched];
    arr.sort((a, b) => {
      if (sort === 'start') return new Date(a.startDate || 0) - new Date(b.startDate || 0);
      if (sort === 'end') return new Date(a.endDate || 0) - new Date(b.endDate || 0);
      if (sort === 'progress') return b._pct - a._pct;
      if (sort === 'title') return (a.title || '').localeCompare(b.title || '');
      if (sort === 'group') return (a.group || '').localeCompare(b.group || '');
      return 0;
    });
    return arr;
  }, [enriched, sort]);
  const grouped = useMemo(() => {
    if (groupBy === 'none') return [['All', sorted]];
    const keyFn = groupBy === 'team' ? p => p.group || '—' : groupBy === 'status' ? p => p.status || '—' : p => p.stage || '—';
    const m = new Map();
    sorted.forEach(p => {
      const k = keyFn(p);
      if (!m.has(k)) m.set(k, []);
      m.get(k).push(p);
    });
    return [...m.entries()].sort((a, b) => b[1].length - a[1].length);
  }, [sorted, groupBy]);

  // CSV export of this list
  const exportList = () => {
    const headers = ['Title', 'Group', 'Stage', 'Status', 'Start', 'End', 'Progress%', 'Lead', 'QA/QC', 'Team'];
    const esc = s => {
      s = s == null ? '' : String(s);
